<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Inicio</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>

    <header class="header">
        <div class="logo">FOOD STORE</div>
        <ul class="nav-links">
            <li><a href="#" class="nav-active">Catálogo</a></li>
            <li><a href="../../client/Orders/Orders.html">Mis Pedidos</a></li>
            <li class="cart-link-container">
                <a href="../Cart/Cart.html">Mi Carrito</a>
                <span id="cart-counter" class="cart-badge">0</span>
            </li>
            <li><a href="../../client/profile/Profile.html">Mi Perfil</a></li>
            <li><a href="#" id="btn-logout" style="color: #e63946; font-weight: bold;">Cerrar Sesión</a></li>
        </ul>
    </header>

    <main class="layout-container">
        <section class="categories-section">
            <h3>Categorías</h3>
            <ul id="lista-categorias"></ul>
        </section>

        <section class="search-section" style="display: flex; gap: 15px; align-items: center; justify-content: center; margin-bottom: 30px;">
    
    <input type="text" id="input-busqueda" placeholder="¿Qué buscamos hoy?" 
           style="padding: 10px 15px; border-radius: 8px; border: 1px solid #ccc; width: 300px; font-size: 1rem; height: 42px; box-sizing: border-box;">
    
    <button id="btn-buscar" 
            style="padding: 0 20px; height: 42px; border-radius: 8px; border: none; background: #e63946; color: white; cursor: pointer; font-size: 1rem; font-weight: bold; box-sizing: border-box;">
        Buscar
    </button>
    
    <select id="select-orden" 
            style="padding: 0 15px; height: 42px; border-radius: 8px; border: 1px solid #ccc; font-size: 1rem; background-color: white; cursor: pointer; box-sizing: border-box;">
        <option value="defecto">Ordenar por...</option>
        <option value="precio-asc">Precio: Menor a Mayor</option>
        <option value="precio-desc">Precio: Mayor a Menor</option>
        <option value="nombre-asc">Nombre: A - Z</option>
        <option value="nombre-desc">Nombre: Z - A</option>
    </select>

</section>

        <section class="products-section">
            <h2 class="section-title">Nuestros Productos</h2>
            <div id="contenedor-productos"></div>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-info">
                <h4>Información de contacto</h4>
                <p>📧 contacto@foodstore.com</p>
                <p>📞 +123 456 789</p>
            </div>
            <div class="footer-divider"></div>
            <p class="footer-copy">&copy; 2026 Food Store - Todos los derechos reservados.</p>
        </div>
    </footer> 

    <script type="module" src="./home.ts"></script>
</body>
</html>
