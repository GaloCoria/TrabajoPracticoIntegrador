<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Mi Carrito</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>

    <header class="header">
        <div class="logo">FOOD STORE</div>
        <ul class="nav-links">
            <li><a href="../Home/Home.html">Catálogo</a></li>
            <li><a href="../../client/Orders/Orders.html">Mis Pedidos</a></li>
            <li class="cart-link-container">
                <a href="#" class="nav-active">Mi Carrito</a>
                <span id="cart-counter" class="cart-badge">0</span>
            </li>
            <li><a href="../../client/profile/Profile.html">Mi Perfil</a></li>
            <li><a href="#" id="btn-logout" style="color: #e63946; font-weight: bold;">Cerrar Sesión</a></li>
        </ul>
    </header>

    <main class="layout-container">
        <h2 class="section-title">Tu Pedido</h2>

        <div class="cart-container">
            <table class="cart-table">
                <thead>
                    <tr>
                        <th>Producto</th>
                        <th>Precio</th>
                        <th>Cantidad</th>
                        <th>Subtotal</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="lista-carrito"></tbody>
            </table>

            <section id="resumen-compra" class="cart-total-section">
                <div class="pago-container" style="margin-bottom: 15px;">
                    <label for="select-pago" style="font-weight: bold;">Forma de Pago:</label>
                    <select id="select-pago" style="padding: 5px; margin-left: 10px;">
                        <option value="EFECTIVO">Efectivo</option>
                        <option value="TARJETA">Tarjeta</option>
                        <option value="TRANSFERENCIA">Transferencia</option>
                    </select>
                </div>

                <div class="total-row">
                    <span>Total a pagar:</span>
                    <span id="total-precio" class="final-price">$0.00</span>
                </div>
                <div class="cart-actions">
                    <button id="btn-vaciar" class="btn-outline">Vaciar Carrito</button>
                    <button id="btn-finalizar" class="btn-agregar">Finalizar Compra</button>
                </div>
            </section>
        </div>
    </main>

    <footer class="main-footer">
        <div class="footer-content">
            <div class="footer-info">
                <h4>Información de contacto</h4>
                <p>📧 contacto@foodstore.com</p>
                <p>📞 +123 456 789</p>
            </div>
            <div class="footer-divider"></div>
            <p class="footer-copy">&copy; 2026 Food Store - Todos los derechos reservados.</p>
        </div>
    </footer> 

    <script type="module" src="./Cart.ts"></script>
</body>
</html>
