<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Mis Pedidos</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body>

    <header class="header">
        <div class="logo">FOOD STORE</div>
        <ul class="nav-links">
            <li><a href="../../store/Home/Home.html">Catálogo</a></li>
            <li><a href="#" class="nav-active">Mis Pedidos</a></li>
            <li class="cart-link-container">
                <a href="../../store/Cart/Cart.html">Mi Carrito</a>
                <span id="cart-counter" class="cart-badge">0</span>
            </li>
            <li><a href="../profile/Profile.html">Mi Perfil</a></li>
            <li><a href="#" id="btn-logout" style="color: #e63946; font-weight: bold;">Cerrar Sesión</a></li>
        </ul>
    </header>

    <main class="layout-container">
        <h2 class="section-title">Historial de Pedidos</h2>
        
        <div id="orders-container" class="orders-grid">
            </div>
    </main>

    <div id="order-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-order-title" class="modal-title">Detalle del Pedido</h3>
                <button id="close-modal-btn" class="close-btn">&times;</button>
            </div>
            
            <div class="modal-body">
                <div id="modal-order-status" class="order-status-banner"></div>
                
                <div class="order-section">
                    <h4>Productos Adquiridos</h4>
                    <ul id="modal-order-items" class="modal-items-list"></ul>
                </div>

                <div class="order-summary-section">
                    <div class="summary-row">
                        <span>Subtotal:</span> 
                        <span id="modal-subtotal">$0,00</span>
                    </div>
                    <div class="summary-row">
                        <span>Costo de Envío:</span> 
                        <span id="modal-shipping">$0,00</span>
                    </div>
                    <div class="summary-row total-row">
                        <span>Total:</span> 
                        <span id="modal-total" class="final-price">$0,00</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="./orders.ts"></script>
</body>
</html>
