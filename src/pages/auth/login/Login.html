<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Login</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body class="login-screen"> <div class="login-card"> <h1>Login</h1>

        <form id="form">
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" autocomplete="off" placeholder="example@example.com" required>
            </div>
            <div>
                <label for="password">Password</label>
                <input type="password" id="password" name="password" autocomplete="off" placeholder="********" required>
            </div>
            

            <button type="submit">Ingresar</button>
        </form>

        <p style="margin-top: 15px; text-align: center; font-size: 0.9rem;">
            ¿No tienes cuenta? <a href="../registro/registro.html">Regístrate aquí</a>
        </p>
    </div>

    <script type="module" src="./login.ts"></script>
</body>
</html>
