<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Store - Registro</title>
    <link rel="stylesheet" href="../../../style.css">
</head>
<body class="login-screen">
    <div class="login-card">
        <h1>Crear Cuenta</h1>
        <p style="text-align: center; color: #666; margin-bottom: 20px;">
            Completá tus datos para empezar a comprar
        </p>

        <form id="form-registro">
            <div>
                <label for="nombre">Nombre</label>
                <input type="text" id="nombre" name="nombre" placeholder="Juan" required>
            </div>
            <div>
                <label for="apellido">Apellido</label>
                <input type="text" id="apellido" name="apellido" placeholder="Pérez" required>
            </div>
            <div>
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="tu@email.com" required>
            </div>
            <div>
                <label for="celular">Celular (Opcional)</label>
                <input type="text" id="celular" name="celular" placeholder="1122334455">
            </div>
            <div>
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="********" required>
            </div>
            <div>
                <label for="confirm-password">Confirmar Contraseña</label>
                <input type="password" id="confirm-password" name="confirm-password" placeholder="********" required>
            </div>

            <button type="submit">Registrarse</button>
        </form>

        <p style="margin-top: 15px; text-align: center; font-size: 0.9rem;">
            ¿Ya tienes cuenta? <a href="../login/login.html">Inicia sesión</a>
        </p>
    </div>

    <script type="module" src="./registro.ts"></script>
</body>
</html>
